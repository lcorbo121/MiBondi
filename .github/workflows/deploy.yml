name: Deploy a somee (FTP)

# Se ejecuta en cada push a main, o manualmente desde la pestaña Actions.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FTP_HOST: MiBusCorbo.somee.com
  FTP_DIR: /www.MiBusCorbo.somee.com/

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Publicar (self-contained, multi-archivo para IIS)
        run: >
          dotnet publish -c Release
          -r win-x86 --self-contained true
          -p:PublishSingleFile=false -p:PublishTrimmed=false
          -o deploy

      - name: Poner app_offline (apaga la app y libera los locks de IIS)
        run: |
          echo '<html><body><h2>Actualizando la app...</h2></body></html>' > app_offline.htm
          curl -sS --ftp-create-dirs -T app_offline.htm \
            --user "${{ secrets.SOMEE_FTP_USERNAME }}:${{ secrets.SOMEE_FTP_PASSWORD }}" \
            "ftp://${FTP_HOST}${FTP_DIR}app_offline.htm"
          echo "app_offline subido; esperando a que IIS suelte los archivos..."
          sleep 10

      - name: Subir por FTP a somee
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: MiBusCorbo.somee.com
          username: ${{ secrets.SOMEE_FTP_USERNAME }}
          password: ${{ secrets.SOMEE_FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./deploy/
          server-dir: /www.MiBusCorbo.somee.com/

      - name: Quitar app_offline (vuelve a arrancar la app)
        if: always()
        run: |
          curl -sS --user "${{ secrets.SOMEE_FTP_USERNAME }}:${{ secrets.SOMEE_FTP_PASSWORD }}" \
            "ftp://${FTP_HOST}/" -Q "DELE ${FTP_DIR}app_offline.htm" || true
